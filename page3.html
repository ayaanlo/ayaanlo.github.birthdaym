<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories 💖</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #ff6f91, #ffb6c1, #ffc0cb);
    color: white;
    text-align: center;

    opacity: 0;
    transition: opacity 0.6s ease;
}

body.show { opacity: 1; }

h1 { font-size: 8vw; }

.card {
    background: rgba(255,255,255,0.3);
    padding: 20px;
    margin: 15px;
    border-radius: 20px;
    font-size: 5vw;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 180px;
    border-radius: 15px;
    object-fit: cover;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.08);
}

button {
    font-size: 5vw;
    padding: 15px;
    border-radius: 30px;
    border: none;
    background: #ff69b4;
    color: white;
}

.bike {
    position: fixed;
    bottom: 20px;
    left: -100px;
    font-size: 50px;
    animation: ride 8s linear infinite;
}

@keyframes ride {
    0% { left: -100px; }
    100% { left: 110%; }
}
</style>
</head>

<body>

<h1>Some things I want to say 💖</h1>

<div class="card">You’ve taken me to so many places, but the best journey is with you 🌍❤️</div>
<div class="card">Your strictness made me better 🙏💖</div>
<div class="card">Thank you for all your sacrifices 🥺❤️</div>
<div class="card">You will always be my home 🏡💞</div>

<h1>Our Memories 📸</h1>

<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
</div>

<button onclick="nextPage()">Last Page 💖</button>

<div class="bike">🏍️</div>

<audio id="bgMusic" loop>
<source src="music.mp3">
</audio>

<script>
window.onload = () => document.body.classList.add("show");

document.body.addEventListener("click", function () {
document.getElementById("bgMusic").play();
}, { once: true });

function nextPage(){
document.body.classList.remove("show");
setTimeout(()=>{window.location.href="page4.html";},600);
}
</script>

</body>
</html>
