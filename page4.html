<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love You Mom ❤️</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff6f91, #ffb6c1, #ffc0cb);
    color: white;
    text-align: center;
    padding: 20px;

    opacity: 0;
    transition: opacity 0.6s ease;
}

body.show { opacity: 1; }

h1 { font-size: 9vw; }
p { font-size: 5.5vw; }
</style>
</head>

<body>

<div>
<h1>Happy Birthday Mom ❤️</h1>
<p>
Everything I am is because of you 💖  
You are my strength, my guide, my home.  
<br><br>
I love you so much ❤️
</p>
</div>

<audio id="bgMusic" loop>
<source src="music.mp3">
</audio>

<script>
window.onload = () => document.body.classList.add("show");

document.body.addEventListener("click", function () {
document.getElementById("bgMusic").play();
}, { once: true });
</script>

</body>
</html>
